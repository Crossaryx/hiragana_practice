<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="menu">
    <h1>japanese practice</h1>
    <div class="menu-btns">
      <button class="mode-btn" id="hiragana-mode-btn">hiragana</button>
      <button class="mode-btn" id="katakana-mode-btn">katakana</button>
      <button class="mode-btn" id="reading-btn">reading</button>
    </div>
  </div>

  <!-- Character practice: row selection -->
  <div id="setup" style="display:none">
    <button id="setup-back-btn">&#8592; menu</button>
    <h2 id="setup-title"></h2>
    <div class="row-grid" id="row-grid"></div>
    <div class="meta-btns">
      <button id="all-btn">Select all</button>
      <button id="none-btn">Deselect all</button>
    </div>
    <button id="start-btn" disabled>Start</button>
  </div>

  <!-- Character practice: flashcard -->
  <div id="practice">
    <button id="back-btn">&#8592; change rows</button>
    <div id="session-stats">&#x2713; <span id="stat-correct">0</span> &nbsp; &#x2717; <span id="stat-wrong">0</span></div>
    <div id="character"></div>
    <div id="choices-grid">
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
    </div>
    <button id="next-btn" style="display:none">Next &#8594;</button>
  </div>

  <!-- Reading practice: script selection -->
  <div id="reading-menu" style="display:none">
    <button id="reading-back-btn">&#8592; menu</button>
    <h2 class="section-title">reading</h2>
    <div class="menu-btns">
      <button class="mode-btn" id="reading-hiragana-btn">hiragana</button>
      <button class="mode-btn" id="reading-katakana-btn">katakana</button>
    </div>
  </div>

  <!-- Reading practice: flashcard -->
  <div id="reading-practice" style="display:none">
    <button id="reading-exit-btn">&#8592; change mode</button>
    <div id="reading-count">&#9642; <span id="stat-seen">0</span></div>
    <div id="reading-word"></div>
    <div id="reading-info">
      <div id="reading-romaji"></div>
      <div id="reading-meaning"></div>
    </div>
    <button id="reveal-btn">reveal</button>
    <button id="reading-next-btn" style="display:none">Next &#8594;</button>
  </div>

  <script src="words.js"></script>
  <script src="script.js"></script>
</body>
</html>
